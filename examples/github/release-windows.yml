# Example Windows caller (copy to .github/workflows/release.yml in a Windows game repo).
# Windows: protected single .exe via maxion-protector (runs on windows-latest).

on:
  push:
    tags: ["v*"]

jobs:
  release:
    uses: maxion-game/maxgame-release-tools/.github/workflows/release-windows.reusable.yml@v0.3.0
    with:
      config: release.config.json
      tools_version: v0.3.0
    secrets:
      TOOLS_DOWNLOAD_TOKEN: ${{ secrets.TOOLS_DOWNLOAD_TOKEN }}
