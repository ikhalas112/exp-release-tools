name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.75

      - name: cargo test
        run: cargo test --locked

      - name: cargo clippy
        run: cargo clippy -- -D warnings
