name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Release Preparation
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Check if prerelease
        id: check_prerelease
        run: |
          if [[ "${{ steps.get_version.outputs.version }}" =~ .*-.* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

  # Build Release Binaries
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_suffix: x86_64-linux
            binary_ext: ''
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_suffix: aarch64-linux
            binary_ext: ''
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_suffix: x86_64-macos
            binary_ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_suffix: aarch64-macos
            binary_ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_suffix: x86_64-windows
            binary_ext: '.exe'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --bins --target ${{ matrix.target }}

      - name: Strip binaries (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/maxion-packer
          strip target/${{ matrix.target }}/release/maxion-stub

      - name: Create release archive
        shell: bash
        run: |
          mkdir -p release-archive

          # Copy binaries
          cp target/${{ matrix.target }}/release/maxion-packer${{ matrix.binary_ext }} release-archive/
          cp target/${{ matrix.target }}/release/maxion-stub${{ matrix.binary_ext }} release-archive/

          # Copy documentation
          cp README.md release-archive/
          cp LICENSE release-archive/ || true

          # Create checksums
          cd release-archive
          if [ "$RUNNER_OS" == "Windows" ]; then
            certutil -hashfile maxion-packer${{ matrix.binary_ext }} SHA256 > checksums.txt
            certutil -hashfile maxion-stub${{ matrix.binary_ext }} SHA256 >> checksums.txt
          else
            shasum -a 256 maxion-packer${{ matrix.binary_ext }} > checksums.txt
            shasum -a 256 maxion-stub${{ matrix.binary_ext }} >> checksums.txt
          fi
          cd ..

          # Create archive
          if [ "$RUNNER_OS" == "Windows" ]; then
            7z a -tzip maxion-protector-${{ matrix.archive_suffix }}.zip release-archive/*
          else
            tar czf maxion-protector-${{ matrix.archive_suffix }}.tar.gz -C release-archive .
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: release-${{ matrix.archive_suffix }}
          path: |
            maxion-protector-${{ matrix.archive_suffix }}.tar.gz
            maxion-protector-${{ matrix.archive_suffix }}.zip

  # Publish to crates.io
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: prepare
    environment:
      name: crates.io
      url: https://crates.io/crates/maxion-core
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Login to crates.io
        run: cargo login ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish maxion-core
        run: cargo publish -p maxion-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish maxion-packer
        run: cargo publish -p maxion-packer
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish maxion-stub
        run: cargo publish -p maxion-stub
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # Create GitHub Release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: ./artifacts

      - name: Generate changelog
        id: changelog
        run: |
          # Extract version
          VERSION="${{ needs.prepare.outputs.version }}"

          # Create changelog from git history
          echo "## Changelog" > changelog.md
          echo "" >> changelog.md

          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "### Changes since $PREV_TAG" >> changelog.md
            echo "" >> changelog.md
            git log --pretty=format:"- %s" ${PREV_TAG}..HEAD >> changelog.md
          else
            echo "### Initial Release" >> changelog.md
            echo "" >> changelog.md
            git log --pretty=format:"- %s" >> changelog.md
          fi

          echo "" >> changelog.md
          echo "### Downloads" >> changelog.md
          echo "" >> changelog.md
          echo "Choose the appropriate binary for your platform:" >> changelog.md
          echo "" >> changelog.md
          echo "- **Linux (x86_64):** \`maxion-protector-x86_64-linux.tar.gz\`" >> changelog.md
          echo "- **Linux (ARM64):** \`maxion-protector-aarch64-linux.tar.gz\`" >> changelog.md
          echo "- **macOS (Intel):** \`maxion-protector-x86_64-macos.tar.gz\`" >> changelog.md
          echo "- **macOS (Apple Silicon):** \`maxion-protector-aarch64-macos.tar.gz\`" >> changelog.md
          echo "- **Windows (x86_64):** \`maxion-protector-x86_64-windows.zip\`" >> changelog.md

          # Read changelog
          CHANGELOG_CONTENT=$(cat changelog.md)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          generate_release_notes: false
          files: |
            artifacts/release-*/*.tar.gz
            artifacts/release-*/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Notify Release Complete
  notify:
    name: Notify Release Complete
    runs-on: ubuntu-latest
    needs: [create-release, publish-crates]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create release summary
        run: |
          echo "## Release Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts:**" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Release: https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- crates.io: https://crates.io/crates/maxion-core" >> $GITHUB_STEP_SUMMARY
